name: Auto-generate prompts every 10 minutes

on:
  schedule:
    # Каждые 10 минут (0, 10, 20, 30, 40, 50 минут каждого часа)
    - cron: '*/10 * * * *'
  workflow_dispatch:  # Ручной запуск

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate prompts with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_prompts.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Auto-generate new prompt [skip ci]"
          git push
